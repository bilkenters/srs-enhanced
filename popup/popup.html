<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>SRS Enhanced</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="popup-header">
      <span class="popup-icon"></span>
      <div class="popup-title-wrap">
        <span class="popup-title">Bilkent SRS Enhanced</span>
        <span class="popup-version">v1.2</span>
      </div>
    </div>
    <div class="popup-body">
      <!-- Master Switch -->
      <div class="popup-section master-section">
        <label class="popup-switch-row">
          <span class="popup-switch-label master-label">Eklenti Durumu</span>
          <label class="popup-toggle">
            <input type="checkbox" id="toggle-master">
            <span class="popup-toggle-slider"></span>
          </label>
        </label>
      </div>

      <div class="popup-divider"></div>

      <!-- Module Switches -->
      <div class="popup-section">
        <label class="popup-switch-row">
          <span class="popup-switch-label">Yaklaşan Sınavlar Paneli</span>
          <label class="popup-toggle">
            <input type="checkbox" id="toggle-dashboard">
            <span class="popup-toggle-slider"></span>
          </label>
        </label>
      </div>

      <div class="popup-section">
        <label class="popup-switch-row">
          <span class="popup-switch-label">Not ve Devamsızlık Rozetleri</span>
          <label class="popup-toggle">
            <input type="checkbox" id="toggle-badges">
            <span class="popup-toggle-slider"></span>
          </label>
        </label>
      </div>

      <div class="popup-divider"></div>
      <p class="popup-hint">SRS arayüzündeki mini ayarlar menüsünden de eklentiyi hızlıca yönetebilirsiniz.</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
